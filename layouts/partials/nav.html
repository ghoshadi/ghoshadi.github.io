<header class="site-header">
  <nav class="nav">
    <a class="brand" href="/">Aditya Ghosh</a>

    <div class="nav-right">
      <div class="nav-links">
        {{ range site.Menus.main }}
          <a class="nav-link" href="{{ .URL }}">{{ .Name }}</a>
        {{ end }}

        <button id="theme-toggle" class="theme-toggle nav-theme-toggle" type="button" aria-label="Toggle dark mode">
          <span class="theme-icon theme-icon-light" aria-hidden="true">☼</span>
          <span class="theme-icon theme-icon-dark" aria-hidden="true">☾</span>
        </button>
      </div>
    </div>
  </nav>
</header>
