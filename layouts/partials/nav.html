<header class="site-header">
  <nav class="nav">
    <a class="brand" href="/">Aditya Ghosh</a>

    <div class="nav-right">
      <div class="nav-links">
        {{ range site.Menus.main }}
          <a class="nav-link" href="{{ .URL }}">{{ .Name }}</a>
        {{ end }}
      </div>

      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark mode">
        <span class="theme-toggle-light">☀︎</span>
        <span class="theme-toggle-dark">☾</span>
      </button>
    </div>
  </nav>
</header>
